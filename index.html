<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catalog</title>

<style>
body{
  margin:0;
  padding:20px;
  background:
    radial-gradient(circle at top, #ececec 0%, #dcdcdc 45%, #d6d6d6 100%);
  font-family:Arial,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  box-sizing:border-box;
  overflow-x:hidden;
  min-height:100vh;
}

#loadingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#dcdcdc;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loaderText{
  font-size:22px;
  font-weight:600;
  color:#333;
}

.menu-bar{
  width:min(1600px,94vw);
  margin:0 0 16px 0;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.55);
  border-radius:18px;
  box-shadow:
    0 12px 30px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.65);
  box-sizing:border-box;
}

.menu-group{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.menu-btn{
  min-width:46px;
  height:32px;
  padding:0 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:1px solid rgba(0,0,0,.08);
  background:rgba(255,255,255,.9);
  color:#1f2937;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  letter-spacing:.01em;
  box-shadow:
    0 6px 18px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
  transition:
    transform .18s ease,
    box-shadow .18s ease,
    background .18s ease,
    border-color .18s ease;
  user-select:none;
}

.menu-btn:hover{
  transform:translateY(-1px);
  background:#ffffff;
  border-color:rgba(0,0,0,.12);
  box-shadow:
    0 10px 22px rgba(0,0,0,.10),
    inset 0 1px 0 rgba(255,255,255,.95);
}

.menu-btn:active{
  transform:translateY(0);
  box-shadow:
    0 4px 10px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.9);
}

.menu-btn:focus-visible{
  outline:none;
  box-shadow:
    0 0 0 3px rgba(59,130,246,.22),
    0 8px 20px rgba(0,0,0,.10);
}

.menu-btn.icon-only{
  width:46px;
  padding:0;
  font-size:24px;
  line-height:1;
}

.menu-divider{
  width:1px;
  height:32px;
  background:linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,.14), rgba(0,0,0,0));
  margin:0 2px;
}

.zoom-pill{
  min-width:104px;
  height:32px;
  padding:0 12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(0,0,0,.08);
  background:rgba(248,250,252,.95);
  border-radius:14px;
  font-size:14px;
  font-weight:600;
  color:#334155;
  box-sizing:border-box;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
}

.controls{
  margin-top:20px;
  margin-bottom:6px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

#flipbook-wrap{
  position:relative;
  width:100%;
  height:100%;
  max-width:1600px;
  max-height:1120px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  cursor:default;
}

#flipbook{
  visibility:hidden;
  position:relative;
  z-index:10;
  transform-origin:center center;
  will-change:transform;
  overflow:visible;
}

#flipbook::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:46px;
  height:100%;
  transform:translateX(-50%);
  background:radial-gradient(
    ellipse at center,
    rgba(0,0,0,.22) 0%,
    rgba(0,0,0,.12) 35%,
    rgba(0,0,0,.05) 55%,
    rgba(0,0,0,0) 75%
  );
  pointer-events:none;
  z-index:20;
  opacity:1;
  transition:opacity .25s ease;
}

#flipbook-wrap.book-closed #flipbook::before{
  opacity:0;
}

#flipbook .page{
  background:#fff;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  box-shadow:
    inset 0 0 10px rgba(0,0,0,.10),
    0 2px 10px rgba(0,0,0,.10);
}

#flipbook .page::after{
  content:"";
  position:absolute;
  top:0;
  right:0;
  width:28px;
  height:100%;
  background:linear-gradient(
    to left,
    rgba(0,0,0,.12),
    rgba(0,0,0,.05),
    rgba(0,0,0,0)
  );
  pointer-events:none;
  z-index:5;
}

#flipbook .page img{
  width:100%;
  height:100%;
  display:block;
  object-fit:contain;
  background:#fff;
  border:1px solid #e3e3e3;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-drag:none;
}

#flipbook .page::before{
  content:"";
  position:absolute;
  width:80px;
  height:80px;
  bottom:0;
  opacity:0;
  transition:opacity .25s ease;
  pointer-events:none;
  z-index:6;
}

#flipbook .page:nth-child(even)::before{
  right:0;
  background:linear-gradient(
    135deg,
    rgba(0,0,0,0) 45%,
    rgba(0,0,0,.12) 50%,
    rgba(0,0,0,.25) 55%,
    rgba(255,255,255,.85) 60%
  );
}

#flipbook .page:nth-child(odd)::before{
  left:0;
  background:linear-gradient(
    225deg,
    rgba(0,0,0,0) 45%,
    rgba(0,0,0,.12) 50%,
    rgba(0,0,0,.25) 55%,
    rgba(255,255,255,.85) 60%
  );
}

#flipbook .page:hover::before{
  opacity:1;
}

#flipbook .page:first-child::before,
#flipbook .page:last-child::before{
  display:none;
}

.slider-wrap{
  width:min(1600px,94vw);
  margin-top:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.slider-label{
  font-size:14px;
  color:#1f2937;
  font-weight:600;
}

#pageSlider{
  width:100%;
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  height:10px;
  border-radius:999px;
  outline:none;
  background:linear-gradient(to right, #475569 0%, #475569 0%, #94a3b8 0%, #94a3b8 100%);
}

#pageSlider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:1px solid rgba(15,23,42,.25);
  box-shadow:0 4px 10px rgba(0,0,0,.22);
}

#pageSlider::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffffff;
  border:1px solid rgba(15,23,42,.25);
  box-shadow:0 4px 10px rgba(0,0,0,.22);
}

#pageSlider::-moz-range-track{
  height:10px;
  border-radius:999px;
  background:#94a3b8;
  border:none;
}

.is-zoomed{
  cursor:grab !important;
}

.is-dragging{
  cursor:grabbing !important;
}

@media (max-width: 900px){
  .menu-bar{
    flex-direction:column;
    align-items:stretch;
  }

  .menu-group{
    justify-content:center;
  }

  .menu-divider{
    display:none;
  }
}

@media print{
  html, body{
    background:#fff !important;
    padding:0 !important;
    margin:0 !important;
    overflow:visible !important;
  }

  #loadingScreen,
  .menu-bar,
  .controls,
  .slider-wrap{
    display:none !important;
  }

  #flipbook-wrap{
    max-width:none !important;
    max-height:none !important;
    width:auto !important;
    height:auto !important;
    overflow:visible !important;
  }

  #flipbook{
    transform:none !important;
    visibility:visible !important;
    box-shadow:none !important;
  }

  #flipbook::before,
  #flipbook .page::before,
  #flipbook .page::after{
    display:none !important;
  }

  #flipbook .page{
    box-shadow:none !important;
  }

  #flipbook .page img{
    border:0 !important;
  }
}
</style>
</head>

<script>
$(function(){

  const preloadFirstImages = [
    "pages/frontcover1.jpg",
    "pages/frontcover2.jpg",
    "pages/01.jpg",
    "pages/02.jpg",
    "pages/03.jpg",
    "pages/04.jpg",
    "pages/05.jpg",
    "pages/06.jpg"
  ];

  const remainingImages = [
    "pages/07.jpg","pages/08.jpg","pages/09.jpg","pages/10.jpg","pages/11.jpg","pages/12.jpg",
    "pages/13.jpg","pages/14.jpg","pages/15.jpg","pages/16.jpg","pages/17.jpg","pages/18.jpg",
    "pages/19.jpg","pages/20.jpg","pages/21.jpg","pages/22.jpg","pages/23.jpg","pages/24.jpg",
    "pages/25.jpg","pages/26.jpg","pages/27.jpg","pages/28.jpg","pages/29.jpg","pages/30.jpg",
    "pages/31.jpg","pages/32.jpg","pages/33.jpg","pages/34.jpg","pages/35.jpg","pages/36.jpg",
    "pages/37.jpg","pages/38.jpg","pages/39.jpg","pages/40.jpg","pages/41.jpg","pages/42.jpg",
    "pages/43.jpg","pages/44.jpg","pages/45.jpg","pages/46.jpg","pages/47.jpg","pages/48.jpg",
    "pages/49.jpg","pages/50.jpg","pages/51.jpg","pages/52.jpg","pages/53.jpg","pages/54.jpg",
    "pages/55.jpg","pages/56.jpg","pages/57.jpg","pages/58.jpg","pages/59.jpg","pages/60.jpg",
    "pages/61.jpg","pages/62.jpg","pages/63.jpg","pages/64.jpg","pages/backcover1.jpg","pages/backcover2.jpg"
  ];

  function preloadImages(imageList, callback){
    let loaded = 0;
    const total = imageList.length;

    if(total === 0){
      callback();
      return;
    }

    imageList.forEach(function(src){
      const img = new Image();
      img.onload = img.onerror = function(){
        loaded++;
        if(loaded === total){
          callback();
        }
      };
      img.src = src;
    });
  }

  function preloadRemainingImages(imageList){
    setTimeout(function(){
      imageList.forEach(function(src){
        const img = new Image();
        img.src = src;
      });
    }, 300);
  }

  preloadImages(preloadFirstImages, function(){

    const flipbook = $("#flipbook");
    const wrap = $("#flipbook-wrap");
    const slider = $("#pageSlider");
    const pageDisplay = $("#pageDisplay");
    const zoomDisplay = $("#zoomDisplay");

    let wheelLock = false;

    let zoomLevel = 1;
    const minZoom = 1;
    const maxZoom = 3;
    const zoomStep = 0.25;

    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    const spreadData = [
      { page:1, label:"- Front Cover" },
      { page:2, label:"- A-i" },
      { page:4, label:"ii-1" },
      { page:6, label:"2-3" },
      { page:8, label:"4-5" },
       { page:10, label:"6-7" },
      { page:12, label:"8-9" },
       { page:14, label:"10-11" },
       { page:16, label:"12-13" },
       { page:18, label:"14-15" },
       { page:20, label:"16-17" },
       { page:22, label:"18-19" },
       { page:24, label:"20-21" },
       { page:26, label:"22-23" },
       { page:28, label:"24-25" },
       { page:30, label:"26-27" },
       { page:32, label:"28-29" },
       { page:34, label:"30-31" },
       { page:36, label:"32-33" },
       { page:38, label:"34-35" },
       { page:40, label:"36-37" },
       { page:42, label:"38-39" },
       { page:44, label:"40-41" },
       { page:46, label:"42-43" },
       { page:48, label:"44-45" },
       { page:50, label:"46-47" },
       { page:52, label:"48-49" },
       { page:54, label:"50-51" },
       { page:56, label:"52-53" },
       { page:58, label:"54-55" },
       { page:60, label:"56-57" },
       { page:62, label:"58-59" },
       { page:64, label:"60-61" },
       { page:66, label:"62 - B" },
       { page:67, label:"- Back Cover" }
    ];

    function calculateBookSize(){
      const maxWidth = window.innerWidth * 0.94;
      const maxHeight = window.innerHeight * 0.78;
      const ratio = 1000 / 700;

      let width = maxWidth;
      let height = width / ratio;

      if(height > maxHeight){
        height = maxHeight;
        width = height * ratio;
      }

      return {
        width: Math.floor(width),
        height: Math.floor(height)
      };
    }

    function normalizeDisplayPage(page){
      let normalized = spreadData[0].page;
      for(let i = 0; i < spreadData.length; i++){
        if(page >= spreadData[i].page){
          normalized = spreadData[i].page;
        } else {
          break;
        }
      }
      return normalized;
    }

    function getSliderIndexFromPage(page){
      const normalized = normalizeDisplayPage(page);
      const index = spreadData.findIndex(item => item.page === normalized);
      return index >= 0 ? index : 0;
    }

    function getSpreadLabel(page){
      const normalized = normalizeDisplayPage(page);
      const match = spreadData.find(item => item.page === normalized);
      return match ? match.label : "";
    }

    function updateSliderFill(){
      const min = parseFloat(slider.attr("min")) || 0;
      const max = parseFloat(slider.attr("max")) || 100;
      const val = parseFloat(slider.val()) || 0;
      const percent = ((val - min) / (max - min)) * 100;

      slider.css(
        "background",
        "linear-gradient(to right, #475569 0%, #475569 " + percent + "%, #94a3b8 " + percent + "%, #94a3b8 100%)"
      );
    }

    function updateClosed(page){
      const total = flipbook.turn("pages");
      if(page === 1 || page === total){
        wrap.addClass("book-closed");
      } else {
        wrap.removeClass("book-closed");
      }
    }

    function updateSlider(page){
      const normalized = normalizeDisplayPage(page);
      slider.val(getSliderIndexFromPage(normalized));
      pageDisplay.text(getSpreadLabel(normalized));
      updateSliderFill();
    }

    function clampPan(){
      const bookWidth = flipbook.width() * zoomLevel;
      const bookHeight = flipbook.height() * zoomLevel;
      const wrapWidth = wrap.width();
      const wrapHeight = wrap.height();

      const maxPanX = Math.max(0, (bookWidth - wrapWidth) / 2);
      const maxPanY = Math.max(0, (bookHeight - wrapHeight) / 2);

      panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
      panY = Math.min(maxPanY, Math.max(-maxPanY, panY));
    }

    function applyZoom(){
      if(zoomLevel <= 1){
        panX = 0;
        panY = 0;
      }

      clampPan();

      flipbook.css("transform", "translate(" + panX + "px, " + panY + "px) scale(" + zoomLevel + ")");
      zoomDisplay.text(Math.round(zoomLevel * 100) + "%");

      if(zoomLevel > 1){
        wrap.addClass("is-zoomed");
      } else {
        wrap.removeClass("is-zoomed is-dragging");
      }
    }

    function setZoom(newZoom){
      zoomLevel = Math.max(minZoom, Math.min(maxZoom, newZoom));
      applyZoom();
    }

    function resetZoom(){
      zoomLevel = 1;
      panX = 0;
      panY = 0;
      applyZoom();
    }

    function recenterAfterTurn(){
      if(zoomLevel > 1){
        panX = 0;
        panY = 0;
        setTimeout(function(){
          applyZoom();
        }, 20);
      }
    }

    function getPrintSpreadFromSliderIndex(spreadIndex){
      let leftPage = "";
      let rightPage = "";

      if(spreadIndex === 0){
        leftPage = "";
        rightPage = "pages/frontcover1.jpg";
      } else if(spreadIndex === 1){
        leftPage = "pages/frontcover2.jpg";
        rightPage = "pages/01.jpg";
      } else if(spreadIndex >= 2 && spreadIndex <= 32){
        const leftNum = (spreadIndex * 2) - 2;
        const rightNum = (spreadIndex * 2) - 1;

        leftPage = "pages/" + String(leftNum).padStart(2, "0") + ".jpg";
        rightPage = "pages/" + String(rightNum).padStart(2, "0") + ".jpg";
      } else if(spreadIndex === 33){
        leftPage = "pages/64.jpg";
        rightPage = "pages/backcover1.jpg";
      } else if(spreadIndex === 34){
        leftPage = "pages/backcover2.jpg";
        rightPage = "";
      }

      return { leftPage, rightPage };
    }

    function printCurrentSpread(){
      const shownLabel = pageDisplay.text().trim();
      const spreadIndex = parseInt(slider.val(), 10) || 0;
      const spread = getPrintSpreadFromSliderIndex(spreadIndex);

      const leftPage = spread.leftPage;
      const rightPage = spread.rightPage;

      if(!leftPage && !rightPage){
        return;
      }

      const spreadImages = [leftPage, rightPage].filter(Boolean);
      let loaded = 0;

      function buildPrintMarkup(){
        let html = "";
        html += '<!DOCTYPE html>';
        html += '<html lang="en">';
        html += '<head>';
        html += '<meta charset="utf-8">';
        html += '<meta name="viewport" content="width=device-width, initial-scale=1.0">';
        html += '<title>Print Spread - ' + shownLabel + '</title>';
        html += '<style>';
        html += '@page{size:landscape;margin:0.25in;}';
        html += 'html,body{margin:0;padding:0;width:100%;height:100%;background:#fff;overflow:hidden;}';
        html += 'body{font-family:Arial,sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact;}';
        html += '.sheet{width:100vw;height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden;}';
        html += '.slot{display:flex;align-items:center;justify-content:center;width:100%;height:100%;overflow:hidden;background:#fff;}';
        html += '.slot img{display:block;width:100%;height:100%;object-fit:contain;object-position:center center;border:0;margin:0;padding:0;}';
        html += '.blank{width:100%;height:100%;background:#fff;}';
        html += '@media print{html,body{width:100%;height:100%;overflow:hidden;}.sheet{width:100%;height:100%;}}';
        html += '</style>';
        html += '</head>';
        html += '<body>';
        html += '<div class="sheet">';

        html += '<div class="slot">';
        if(leftPage){
          html += '<img src="' + leftPage + '" alt="">';
        } else {
          html += '<div class="blank"></div>';
        }
        html += '</div>';

        html += '<div class="slot">';
        if(rightPage){
          html += '<img src="' + rightPage + '" alt="">';
        } else {
          html += '<div class="blank"></div>';
        }
        html += '</div>';

        html += '</div>';
        html += '<script>';
        html += '(function(){';
        html += 'function runPrint(){';
        html += 'setTimeout(function(){';
        html += 'window.focus();';
        html += 'window.print();';
        html += 'setTimeout(function(){window.close();},500);';
        html += '},300);';
        html += '}';
        html += 'if(document.readyState==="complete"){runPrint();}';
        html += 'else{window.addEventListener("load",runPrint);}';
        html += '})();';
        html += '<\/script>';
        html += '</body>';
        html += '</html>';

        return html;
      }

      function openPrintWindow(){
        const printWindow = window.open("", "_blank", "width=1400,height=900");

        if(!printWindow){
          alert("Please allow pop-ups for printing.");
          return;
        }

        printWindow.document.open();
        printWindow.document.write(buildPrintMarkup());
        printWindow.document.close();
      }

      if(spreadImages.length === 0){
        openPrintWindow();
        return;
      }

      spreadImages.forEach(function(src){
        const img = new Image();
        img.onload = img.onerror = function(){
          loaded++;
          if(loaded === spreadImages.length){
            openPrintWindow();
          }
        };
        img.src = src;
      });
    }

    const size = calculateBookSize();

    flipbook.turn({
      width: size.width,
      height: size.height,
      autoCenter: true,
      display: "double",
      page: 1,
      duration: 900,
      gradients: true,
      acceleration: true,
      elevation: 80,
      when: {
        turned: function(e, page){
          updateClosed(page);
          updateSlider(page);
          recenterAfterTurn();
        }
      }
    });

    updateClosed(1);
    updateSlider(1);
    updateSliderFill();
    applyZoom();

    flipbook.css("visibility","visible");
    $("#loadingScreen").fadeOut(400);

    preloadRemainingImages(remainingImages);

    $("#prevBtn").on("click", function(){
      flipbook.turn("previous");
    });

    $("#nextBtn").on("click", function(){
      flipbook.turn("next");
    });

    $("#zoomInBtn").on("click", function(){
      setZoom(zoomLevel + zoomStep);
    });

    $("#zoomOutBtn").on("click", function(){
      setZoom(zoomLevel - zoomStep);
    });

    $("#resetZoomBtn").on("click", function(){
      resetZoom();
    });

    $("#printBtn").on("click", function(){
      printCurrentSpread();
    });

    slider.on("input change", function(){
      updateSliderFill();
      const spreadIndex = parseInt($(this).val(), 10);
      const targetPage = spreadData[spreadIndex].page;
      flipbook.turn("page", targetPage);
    });

    $(document).on("keydown", function(e){
      if(e.key === "ArrowLeft"){
        e.preventDefault();
        flipbook.turn("previous");
      }

      if(e.key === "ArrowRight"){
        e.preventDefault();
        flipbook.turn("next");
      }

      if((e.key === "+" || e.key === "=") && (e.ctrlKey || e.metaKey)){
        e.preventDefault();
        setZoom(zoomLevel + zoomStep);
      }

      if(e.key === "-" && (e.ctrlKey || e.metaKey)){
        e.preventDefault();
        setZoom(zoomLevel - zoomStep);
      }

      if(e.key === "0" && (e.ctrlKey || e.metaKey)){
        e.preventDefault();
        resetZoom();
      }

      if(e.key === "Escape"){
        resetZoom();
      }
    });

    wrap.on("wheel", function(e){
      if(e.ctrlKey || e.metaKey){
        e.preventDefault();
        if(e.originalEvent.deltaY < 0){
          setZoom(zoomLevel + zoomStep);
        } else {
          setZoom(zoomLevel - zoomStep);
        }
        return;
      }

      e.preventDefault();

      if(wheelLock) return;
      wheelLock = true;

      if(e.originalEvent.deltaY > 0){
        flipbook.turn("next");
      } else {
        flipbook.turn("previous");
      }

      setTimeout(function(){
        wheelLock = false;
      }, 250);
    });

    wrap.on("mousedown", function(e){
      if(zoomLevel <= 1) return;

      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startPanX = panX;
      startPanY = panY;

      wrap.addClass("is-dragging");
      e.preventDefault();
    });

    $(document).on("mousemove", function(e){
      if(!isDragging) return;

      panX = startPanX + (e.clientX - dragStartX);
      panY = startPanY + (e.clientY - dragStartY);
      applyZoom();
    });

    $(document).on("mouseup", function(){
      isDragging = false;
      wrap.removeClass("is-dragging");
    });

    flipbook.on("mousemove", function(e){
      if(zoomLevel > 1 || isDragging) return;

      const offset = flipbook.offset();
      const x = e.pageX - offset.left;
      const y = e.pageY - offset.top;
      const width = flipbook.width();
      const height = flipbook.height();
      const corner = 120;

      let peel = false;

      if(x < corner && y > height - corner) peel = "bl";
      if(x > width - corner && y > height - corner) peel = "br";

      if(peel){
        flipbook.turn("peel", peel);
      } else {
        flipbook.turn("peel", false);
      }
    });

    flipbook.on("mouseleave", function(){
      if(zoomLevel === 1){
        flipbook.turn("peel", false);
      }
    });

    $(window).on("resize", function(){
      const size = calculateBookSize();
      flipbook.turn("size", size.width, size.height);
      applyZoom();
    });

    flipbook.find("img").on("dragstart", function(e){
      e.preventDefault();
    });

    flipbook.on("dblclick", function(){
      if(zoomLevel === 1){
        setZoom(2);
      } else {
        resetZoom();
      }
    });

  });

});
</script>

</body>
</html>
